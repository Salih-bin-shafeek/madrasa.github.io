<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Report | Manarul Quran</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:linear-gradient(135deg,#0b1026,#1e1b4b,#312e81);
min-height:100vh;
color:white;
padding:30px;
}

.container{
max-width:1200px;
margin:auto;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
flex-wrap:wrap;
gap:15px;
}

.logo{
font-size:34px;
font-weight:800;
color:#f8e7b0;
}

.homebtn{
text-decoration:none;
background:#8b5cf6;
color:white;
padding:12px 18px;
border-radius:12px;
font-weight:700;
}

.title{
text-align:center;
font-size:52px;
font-weight:800;
margin-bottom:10px;
}

.sub{
text-align:center;
font-size:20px;
color:#ddd6fe;
margin-bottom:30px;
}

.card{
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
padding:25px;
border-radius:24px;
margin-bottom:25px;
}

.formgrid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:15px;
}

input,select,button{
width:100%;
height:52px;
border:none;
outline:none;
border-radius:14px;
padding:0 15px;
font-size:16px;
}

input{
background:#1e3a8a;
color:white;
}

select{
background:#6d28d9;
color:white;
}

button{
background:linear-gradient(90deg,#8b5cf6,#7c3aed);
color:white;
font-weight:800;
cursor:pointer;
}

.student{
text-align:center;
font-size:36px;
font-weight:800;
color:#f8e7b0;
margin-bottom:12px;
}

.info{
text-align:center;
margin-bottom:22px;
font-size:18px;
}

.metrics{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.metric{
background:rgba(255,255,255,0.08);
padding:18px;
border-radius:18px;
text-align:center;
}

.metric .icon{
font-size:26px;
margin-bottom:8px;
}

.metric .label{
font-size:14px;
color:#ddd6fe;
margin-bottom:8px;
}

.metric .value{
font-size:32px;
font-weight:800;
}

.status{
margin-top:18px;
padding:16px;
border-radius:18px;
text-align:center;
font-size:24px;
font-weight:800;
background:rgba(255,255,255,0.08);
}

.error{
text-align:center;
color:#fca5a5;
font-weight:700;
padding-top:10px;
}

@media(max-width:800px){
.formgrid{
grid-template-columns:1fr;
}
.title{
font-size:38px;
}
.logo{
font-size:28px;
}
}
</style>
</head>
<body>

<div class="container">

<div class="topbar">
<div class="logo">Manarul Quran</div>
<a href="index.html" class="homebtn">← Home</a>
</div>

<div class="title">Student Report Card</div>
<div class="sub">Monthly Student Progress Report</div>

<div class="card">
<div class="formgrid">

<input type="text" id="studentId" placeholder="Enter Student ID">

<select id="month">
<option>January</option>
<option>February</option>
<option>March</option>
<option>April</option>
<option>May</option>
<option>June</option>
<option>July</option>
<option>August</option>
<option>September</option>
<option>October</option>
<option>November</option>
<option>December</option>
</select>

<button onclick="getReport()">🔍 View Report</button>

</div>

<div id="error" class="error"></div>
</div>

<div id="result"></div>

</div>

<script>
const SHEET_URL =
"https://docs.google.com/spreadsheets/d/1SGRz_IpGWtA0CXk7Ku1U9v7gmY-H3DSDxD2Z-MNbYro/export?format=csv&gid=0";

async function getReport(){

document.getElementById("error").innerHTML="";
document.getElementById("result").innerHTML="";

const sid = document.getElementById("studentId").value.trim();
const month = document.getElementById("month").value.toLowerCase();

const res = await fetch(SHEET_URL);
const txt = await res.text();

const rows = txt.trim().split("\n").map(r => r.split(","));
const headers = rows[0].map(h => h.trim().toLowerCase());

const data = rows.slice(1).map(row=>{
let obj={};
headers.forEach((h,i)=>obj[h]=row[i]);
return obj;
});

const row = data.find(r =>
String(r.student_id).trim() === sid &&
String(r.month).trim().toLowerCase() === month
);

if(!row){
document.getElementById("error").innerHTML =
"No record found. Check Student ID and Month.";
return;
}

const puthiya = parseInt(row.total_puthiya_paadam||0);
const pazhe = parseInt(row.total_pazhe_paadam||0);
const working = parseInt(row.total_working_days||0);
const present = parseInt(row.present||0);
const absent = parseInt(row.absent||0);
const attendance = ((present/working)*100).toFixed(1);

let status = "Needs Improvement";
if(attendance >= 95) status = "Excellent";
else if(attendance >= 85) status = "Good";
else if(attendance >= 70) status = "Average";

document.getElementById("result").innerHTML = `
<div class="card">

<div class="student">${row.student_name}</div>

<div class="info">
Student ID: <b>${row.student_id}</b>
&nbsp; | &nbsp;
Month: <b>${row.month}</b>
</div>

<div class="metrics">

<div class="metric">
<div class="icon">📖</div>
<div class="label">Puthiya Paadam</div>
<div class="value">${puthiya}</div>
</div>

<div class="metric">
<div class="icon">📚</div>
<div class="label">Pazhe Paadam</div>
<div class="value">${pazhe}</div>
</div>

<div class="metric">
<div class="icon">🏫</div>
<div class="label">Working Days</div>
<div class="value">${working}</div>
</div>

<div class="metric">
<div class="icon">📅</div>
<div class="label">Present</div>
<div class="value">${present}</div>
</div>

<div class="metric">
<div class="icon">❌</div>
<div class="label">Absent</div>
<div class="value">${absent}</div>
</div>

<div class="metric">
<div class="icon">📊</div>
<div class="label">Attendance %</div>
<div class="value">${attendance}%</div>
</div>

</div>

<div class="status">
Performance Status : ${status}
</div>

</div>
`;
}
</script>

</body>
</html>
